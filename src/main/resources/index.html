<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SportsDB Event Viewer</title>
  <meta name="description" content="View live event data for Arsenal vs Chelsea matches in the 2016-2017 season.">
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="background-globes">
    <div class="globe globe-1"></div>
    <div class="globe globe-2"></div>
    <div class="globe globe-3"></div>
  </div>

  <div class="app-shell">
    <header class="glass-panel main-header" id="main-header">
      <div class="header-content">
        <h1>Arsenal vs Chelsea <span class="season">2016-2017</span></h1>
        <p>Live Event Data from TheSportsDB</p>
      </div>
      <div class="stats-overview" id="stats-overview">
          <!-- Stats injected here -->
      </div>
    </header>

    <main>
      <div id="loader" class="loader-container">
        <div class="spinner"></div>
      </div>
      <div class="events-grid" id="events-grid">
        <!-- Events injected here -->
      </div>
    </main>
  </div>
  <script src="proyect1.js"></script>
</body>
</html>
